<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Vehicle Collision Dataset</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Motor Vehicle Collision Dataset</h1>
    </header>

    <div id="filters">
        <label for="collision-type">Collision Type:</label>
        <select id="collision-type">
            <option value="all">All</option>
            <option value="rear-end">Rear End</option>
            <option value="side-impact">Side Impact</option>
        </select>

        <label for="date-range">Date Range:</label>
        <input type="date" id="start-date">
        <input type="date" id="end-date">

        <button id="filter-btn">Filter</button>
    </div>

    <div id="cards-container">
        <!-- Cards will be dynamically inserted here -->
    </div>

    <script src="script.js"></script>
</body>
</html>
